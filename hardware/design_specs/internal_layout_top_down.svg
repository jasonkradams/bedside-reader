<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="100%" height="100%">
  <defs>
    <style>
      .wall { fill: none; stroke: #868e96; stroke-width: 10; stroke-linejoin: round; }
      .component-pi { fill: #d3f9d8; stroke: #2b8a3e; stroke-width: 3; }
      .component-screen { fill: #e9ecef; stroke: #495057; stroke-width: 3; }
      .component-speaker { fill: #fff3bf; stroke: #f5a623; stroke-width: 3; }
      .component-encoder { fill: #e3fafc; stroke: #0c8599; stroke-width: 3; }
      .component-amp { fill: #ffe3e3; stroke: #c92a2a; stroke-width: 3; }
      .label { fill: #212529; font-family: sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .sub-label { fill: #495057; font-family: monospace; font-size: 12px; text-anchor: middle; }
      .wiring { fill: none; stroke: #ced4da; stroke-width: 4; stroke-dasharray: 8,8; }
    </style>
  </defs>

  <!-- Enclosure Outline (Top-Down, Front is at the bottom) -->
  <!-- Outer dimensions: 140x60mm (700x300 units). Wall thickness 2mm (10 units) -->
  <!-- Shifted down by 25 units for margin -->
  <rect class="wall" x="5" y="25" width="690" height="300" rx="20" />
  <text class="sub-label" x="350" y="15">REAR PANEL</text>
  <text class="sub-label" x="350" y="345">FRONT PANEL</text>

  <!-- Display HAT Mini (Front Left) -->
  <!-- Center X = 40.5mm (202.5 units). Width 65.5mm (327.5). -->
  <rect class="component-screen" x="50" y="295" width="305" height="25" />
  <text class="label" x="202" y="312">Display HAT Mini</text>

  <!-- Raspberry Pi Zero 2 W (Floor Mounted) -->
  <rect class="component-pi" x="140" y="100" width="325" height="60" rx="4" />
  <text class="label" x="302" y="125">Raspberry Pi Zero 2 W (Floor)</text>
  
  <!-- Soldered wire harness -->
  <path class="wiring" d="M 202 295 L 302 160" />
  <text class="sub-label" x="270" y="235">Soldered Wires</text>

  <!-- Speaker (Front Right) -->
  <!-- Center X = 105mm (525 units). Width 32mm (160 units). Depth 15.5mm (77.5 units) -->
  <rect class="component-speaker" x="445" y="242.5" width="160" height="77.5" rx="4" />
  <text class="label" x="525" y="280">Speaker</text>
  <text class="sub-label" x="525" y="295">(Bottom-most)</text>

  <!-- Rotary Encoder (Front Right, Above Speaker in Z-axis) -->
  <!-- Body 12x12mm (60x60 units) -->
  <rect class="component-encoder" x="495" y="260" width="60" height="60" rx="2" />
  <!-- Encoder Shaft -->
  <rect class="component-encoder" x="515" y="320" width="20" height="30" />
  <text class="label" x="525" y="250">Encoder</text>

  <!-- Audio Amp MAX98357A (Mounted on back wall) -->
  <!-- Width 19.4mm (97 units), Depth 3mm (15 units) -->
  <rect class="component-amp" x="476.5" y="30" width="97" height="25" rx="2" />
  <text class="label" x="525" y="48">Amp</text>

  <!-- USB Power Cutout (Rear, Panel-Mount) -->
  <!-- Center X = 202.5. Hole pitch 18mm (90 units). Flange width ~26mm (130 units). -->
  <rect class="component-screen" x="137.5" y="15" width="130" height="25" rx="3" />
  <!-- Screw holes -->
  <circle cx="157.5" cy="27.5" r="3" fill="#343a40" />
  <circle cx="247.5" cy="27.5" r="3" fill="#343a40" />
  <!-- USB port protrusion -->
  <rect class="component-screen" x="177" y="0" width="50" height="15" />
  <text class="sub-label" x="202" y="32">USB (18mm Pitch)</text>

  <!-- Wiring paths -->
  <!-- Pi to Amp -->
  <path class="wiring" d="M 465 130 Q 480 130 480 90 T 476.5 42.5" />
  <!-- Amp to Speaker -->
  <path class="wiring" d="M 525 55 L 525 242.5" />

</svg>
